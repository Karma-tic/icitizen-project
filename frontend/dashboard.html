<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>iCitizen Dashboard</title>

    <link
        rel="stylesheet"
        href="css/style.css"
    >

</head>

<body>

    <div class="container">

        <div class="dashboard-box">

            <div class="top-bar">

                <h1>Citizen Management System</h1>

                <button id="logoutBtn">
                    Logout
                </button>

            </div>

            <form id="citizenForm">

                <div class="grid">

                    <div>

                        <label for="first_name">
                            First Name
                        </label>

                        <input
                            type="text"
                            id="first_name"
                            autocomplete="given-name"
                            required
                        >

                    </div>

                    <div>

                        <label for="middle_name">
                            Middle Name
                        </label>

                        <input
                            type="text"
                            id="middle_name"
                            autocomplete="additional-name"
                        >

                    </div>

                    <div>

                        <label for="last_name">
                            Last Name
                        </label>

                        <input
                            type="text"
                            id="last_name"
                            autocomplete="family-name"
                            required
                        >

                    </div>

                    <div>

                        <label for="gender">
                            Gender
                        </label>

                        <select
                            id="gender"
                            required
                        >

                            <option value="">
                                Select
                            </option>

                            <option value="Male">
                                Male
                            </option>

                            <option value="Female">
                                Female
                            </option>

                            <option value="Other">
                                Other
                            </option>

                        </select>

                    </div>

                    <div>

                        <label for="dob">
                            Date of Birth
                        </label>

                        <input
                            type="date"
                            id="dob"
                            required
                        >

                    </div>

                    <div>

                        <label for="age">
                            Age
                        </label>

                        <input
                            type="number"
                            id="age"
                            readonly
                        >

                    </div>

                    <div>

                        <label for="email">
                            Email
                        </label>

                        <input
                            type="email"
                            id="email"
                            autocomplete="email"
                            required
                        >

                    </div>

                    <div>

                        <label for="mobile_number">
                            Mobile Number
                        </label>

                        <input
                            type="tel"
                            id="mobile_number"
                            autocomplete="tel"
                            maxlength="10"
                            required
                        >

                    </div>

                    <div>

                        <label for="city">
                            City
                        </label>

                        <input
                            type="text"
                            id="city"
                            required
                        >

                    </div>

                    <div>

                        <label for="state">
                            State
                        </label>

                        <input
                            type="text"
                            id="state"
                            required
                        >

                    </div>

                    <div>

                        <label for="country">
                            Country
                        </label>

                        <input
                            type="text"
                            id="country"
                            required
                        >

                    </div>

                </div>

                <button type="submit">
                    Add Citizen
                </button>

            </form>

            <div id="message"></div>

            <input
                type="text"
                id="searchInput"
                placeholder="Search citizens..."
            >

            <table>

                <thead>

                    <tr>

                        <th>ID</th>
                        <th>Name</th>
                        <th>Gender</th>
                        <th>Age</th>
                        <th>Email</th>
                        <th>Mobile</th>
                        <th>City</th>
                        <th>Actions</th>

                    </tr>

                </thead>

                <tbody id="citizenTableBody"></tbody>

            </table>

        </div>

    </div>

    <script src="js/dashboard.js"></script>

</body>

</html>
